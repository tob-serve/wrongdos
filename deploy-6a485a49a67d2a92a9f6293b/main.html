<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .container {
      text-align: center;
    }
    .title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--header-accent);
    }
    .icon {
      width: 120px;
      height: 120px;
      fill: var(--header-accent);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="title">Service Under Maintenance</div>
  </div>
</body>
</html>
