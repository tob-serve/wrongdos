<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your account.">
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <div class="card">
      
      <!-- Logo Placeholder & Header -->
      <div class="form-header">
        <div class="logo-container">
          <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        </div>
      </div>
<p class="login-prompt">Enter your details to login</p>
      <!-- Messages Alert Banner -->
      <div class="message-banner" id="messageBanner"></div>

      <!-- SIGN IN FORM -->
      <form class="auth-form" id="signinForm">
        
        <!-- Username -->
        <div class="input-group">
          <div class="input-label-container">
            <label for="signinUsername" class="input-label">Username</label>
          </div>
          <div class="input-wrapper">
            <input type="text" id="signinUsername" class="form-input" placeholder="Username" required autocomplete="username">
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <div class="input-label-container">
            <label for="signinPassword" class="input-label">Password</label>
            <a href="#" class="forgot-link" id="forgotBtn">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <input type="password" id="signinPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="password-toggle" data-target="signinPassword" aria-label="Toggle Password Visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="signinBtn">
          <span class="btn-text">Sign In</span>
          <span class="spinner" id="signinSpinner"></span>
        </button>

        <!-- Old Services Link -->
        <a href="maintenance.html" class="old-services-link" id="oldServicesBtn">Login to our old services</a>

      </form>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
